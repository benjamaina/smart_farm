{% extends "base.html" %}

{% block title %}Login - Smart Farm{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-12 bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold text-center mb-6">Smart Farm Login</h1>

    {% if messages %}
        {% for message in messages %}
            <div class="mb-3 p-2 rounded bg-red-50 border border-red-300 text-red-700 text-sm">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium mb-1">Username</label>
            <input type="text" name="username" required
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Password</label>
            <input type="password" name="password" required
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
        </div>
        <button type="submit"
            class="w-full bg-green-700 hover:bg-green-800 text-white py-2 rounded font-medium">
            Login
        </button>
    </form>
</div>
{% endblock %}
