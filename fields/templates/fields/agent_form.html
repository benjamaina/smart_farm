{% extends "base.html" %}
{% block title %}Add Agent - Smart Farm{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow mt-8">
    <h1 class="text-xl font-bold mb-4">Add Field Agent</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium mb-1">Username</label>
            <input type="text" name="username" required class="w-full border border-gray-300 rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Password</label>
            <input type="password" name="password" required class="w-full border border-gray-300 rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">First Name</label>
            <input type="text" name="first_name" class="w-full border border-gray-300 rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Last Name</label>
            <input type="text" name="last_name" class="w-full border border-gray-300 rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Email</label>
            <input type="email" name="email" class="w-full border border-gray-300 rounded px-3 py-2">
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-green-700 hover:bg-green-800 text-white px-4 py-2 rounded">Create Agent</button>
            <a href="{% url 'agent_list' %}" class="text-gray-600 hover:underline self-center">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
